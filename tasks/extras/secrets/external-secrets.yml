---
- name: "External-Secrets - Add https://charts.external-secrets.io repo"
  kubernetes.core.helm_repository:
    name: external-secrets
    repo_url: "https://charts.external-secrets.io"

- name: "External-Secrets - Deploy external-secrets helm chart"
  kubernetes.core.helm:
    name: external-secrets
    chart_ref: external-secrets/external-secrets
    release_namespace: kube-system
    kubeconfig: "{{ k3s_installation_path }}/config"
    context: local
    wait: true

- name: "External-Secrets - Deploy cluster secret store"
  kubernetes.core.k8s:
    state: present
    force: true
    kubeconfig: "{{ k3s_installation_path }}/config"
    definition:
      kind: ClusterSecretStore
      apiVersion: external-secrets.io/v1
      metadata:
        name: kube-system-secret-store
      spec:
        provider: 
          kubernetes:
            remoteNamespace: kube-system
            server:
              caProvider:
                type: ConfigMap
                name: kube-root-ca.crt
                key: ca.crt
                namespace: kube-system
            auth:
              serviceAccount:
                name: external-secrets
                namespace: kube-system
